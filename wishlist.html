<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Wishlist | FETCHY</title>

    <link rel="icon" href="favicon.ico">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet" href="assets/css/navbar.css">

    <link rel="stylesheet" href="assets/css/wishlist.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<!-- Copy the same navbar from index.html and paste it here -->

<!-- ================= WISHLIST HEADER ================= -->

<section class="wishlist-header">

    <div class="container text-center">

        <h1>❤️ My Wishlist</h1>

        <p>

            Save your favourite products and purchase them later.

        </p>

    </div>

</section>

<!-- ================= WISHLIST ================= -->

<section class="wishlist-page">

<div class="container">

<div class="row">

<div class="col-lg-12">

<div class="wishlist-container">

<!-- Item 1 -->

<div class="wishlist-item">

<img src="assets/images/products/apple.webp"
class="wishlist-image"
alt="Apple">

<div class="wishlist-details">

<h4>Fresh Apples</h4>

<p>

Fresh Organic Apples

</p>

<h5>₹120</h5>

</div>

<div class="wishlist-buttons">

<button class="btn btn-success">

<i class="bi bi-cart-plus"></i>

Add to Cart

</button>

<button class="btn btn-outline-danger">

<i class="bi bi-trash"></i>

Remove

</button>

</div>

</div>

<!-- Item 2 -->

<div class="wishlist-item">

<img src="assets/images/products/milk.jpg"
class="wishlist-image"
alt="Milk">

<div class="wishlist-details">

<h4>Fresh Milk</h4>

<p>

500 ml Pack

</p>

<h5>₹35</h5>

</div>

<div class="wishlist-buttons">

<button class="btn btn-success">

<i class="bi bi-cart-plus"></i>

Add to Cart

</button>

<button class="btn btn-outline-danger">

<i class="bi bi-trash"></i>

Remove

</button>

</div>

</div>

<!-- Item 3 -->

<div class="wishlist-item">

    <img src="assets/images/products/bread.jpg"
         class="wishlist-image"
         alt="Bread">

    <div class="wishlist-details">

        <h4>Whole Wheat Bread</h4>

        <p>Healthy Bakery Bread</p>

        <h5>₹45</h5>

    </div>

    <div class="wishlist-buttons">

        <button class="btn btn-success">

            <i class="bi bi-cart-plus"></i>

            Add to Cart

        </button>

        <button class="btn btn-outline-danger">

            <i class="bi bi-trash"></i>

            Remove

        </button>

    </div>

</div>

<!-- Item 4 -->

<div class="wishlist-item">

    <img src="assets/images/products/banana.webp"
         class="wishlist-image"
         alt="Banana">

    <div class="wishlist-details">

        <h4>Fresh Bananas</h4>

        <p>Farm Fresh Bananas</p>

        <h5>₹60</h5>

    </div>

    <div class="wishlist-buttons">

        <button class="btn btn-success">

            <i class="bi bi-cart-plus"></i>

            Add to Cart

        </button>

        <button class="btn btn-outline-danger">

            <i class="bi bi-trash"></i>

            Remove

        </button>

    </div>

</div>

</div>

</div>

</div>

</section>

<!-- ================= FOOTER ================= -->

<footer class="footer">

    <div class="container">

        <hr>

        <div class="text-center">

            © 2026 FETCHY. All Rights Reserved.

        </div>

    </div>

</footer>

<!-- Bootstrap JS -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
