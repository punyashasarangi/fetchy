<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout | FETCHY</title>

    <link rel="icon" href="favicon.ico">

    <!-- Google Font -->

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Bootstrap Icons -->

    <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <!-- CSS -->

    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="stylesheet" href="assets/css/navbar.css">

    <link rel="stylesheet" href="assets/css/checkout.css">

    <link rel="stylesheet" href="assets/css/dark.css">

</head>

<body>

<!-- ================= NAVBAR ================= -->

<nav class="navbar">

    <div class="container d-flex justify-content-between align-items-center">

        <div class="brand">

            <h1 class="logo">FETCHY</h1>

            <p class="tagline">

                Fresh Groceries. Fast Delivery.

            </p>

        </div>

        <div class="right-navbar">

            <!-- Location -->

            <div class="location">

                <i class="bi bi-geo-alt-fill"></i>

                <div>

                    <span class="deliver-text">

                        Deliver To

                    </span>

                    <h6>Bhubaneswar</h6>

                </div>

            </div>

            <!-- Search -->

            <form class="search-box">

                <div class="input-group">

                    <input
                        type="text"
                        class="form-control"
                        placeholder="Search groceries...">

                    <button class="btn btn-success">

                        <i class="bi bi-search"></i>

                    </button>

                </div>

            </form>

            <!-- Navigation -->

            <ul class="nav-menu">

                <li>

                    <a href="index.html">Home</a>

                </li>

                <li>

                    <a href="products.html">Products</a>

                </li>

                <li>

                    <a href="categories.html">Categories</a>

                </li>

                <li>

                    <a href="offers.html">Offers</a>

                </li>

                <li>

                    <a href="wishlist.html" class="wishlist-link">

                        <i class="bi bi-heart"></i>

                        <span id="wishlist-count" class="cart-badge">0</span>

                    </a>

                </li>

                <li>

                    <a href="cart.html" class="cart-link">

                        <i class="bi bi-cart3"></i>

                        <span id="cart-count" class="cart-badge">0</span>

                    </a>

                </li>

                <li>

                    <a href="login.html" class="login-btn">

                        Login

                    </a>

                </li>

            </ul>

        </div>

    </div>

</nav>

<!-- ================= HEADER ================= -->

<section class="checkout-header">

    <div class="container text-center">

        <h1>

            <i class="bi bi-credit-card"></i>

            Checkout

        </h1>

        <p>

            Complete your order securely.

        </p>

    </div>

</section>

<!-- ================= CHECKOUT ================= -->

<section class="checkout-page">

<div class="container">

<div class="row">

<!-- ================= BILLING DETAILS ================= -->

<div class="col-lg-8">

    <div class="checkout-form">

        <h3 class="mb-4">

            <i class="bi bi-person-fill"></i>

            Billing Details

        </h3>

        <div class="row">

            <div class="col-md-6 mb-3">

                <label class="form-label">First Name</label>

                <input
                    type="text"
                    id="first-name"
                    class="form-control"
                    placeholder="Enter First Name">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">Last Name</label>

                <input
                    type="text"
                    id="last-name"
                    class="form-control"
                    placeholder="Enter Last Name">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">Phone Number</label>

                <input
                    type="tel"
                    id="phone"
                    class="form-control"
                    placeholder="+91 9876543210">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">Email Address</label>

                <input
                    type="email"
                    id="email"
                    class="form-control"
                    placeholder="example@gmail.com">

            </div>

            <div class="col-12 mb-3">

                <label class="form-label">

                    Delivery Address

                </label>

                <textarea
                    id="address"
                    class="form-control"
                    rows="4"
                    placeholder="Enter your complete address"></textarea>

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">

                    City

                </label>

                <input
                    type="text"
                    id="city"
                    class="form-control"
                    placeholder="Bhubaneswar">

            </div>

            <div class="col-md-6 mb-3">

                <label class="form-label">

                    PIN Code

                </label>

                <input
                    type="text"
                    id="pincode"
                    class="form-control"
                    placeholder="751001">

            </div>

        </div>

        <hr class="my-4">

        <h4 class="mb-3">

            <i class="bi bi-wallet2"></i>

            Payment Method

        </h4>

        <div class="form-check mb-3">

            <input
                class="form-check-input"
                type="radio"
                name="payment"
                id="cod"
                value="Cash on Delivery"
                checked>

            <label
                class="form-check-label"
                for="cod">

                💵 Cash on Delivery

            </label>

        </div>

        <div class="form-check mb-3">

            <input
                class="form-check-input"
                type="radio"
                name="payment"
                id="upi"
                value="UPI">

            <label
                class="form-check-label"
                for="upi">

                📱 UPI

            </label>

        </div>

        <div class="form-check">

            <input
                class="form-check-input"
                type="radio"
                name="payment"
                id="card"
                value="Card">

            <label
                class="form-check-label"
                for="card">

                💳 Credit / Debit Card

            </label>

        </div>

    </div>

</div>

<!-- ================= ORDER SUMMARY ================= -->

<div class="col-lg-4">

    <div class="checkout-summary">

        <h3>

            <i class="bi bi-bag-check-fill"></i>

            Your Order

        </h3>

        <hr>

        <!-- Dynamic Products -->

        <div id="checkout-items"></div>

        <hr>

        <div class="summary-item">

            <span>Subtotal</span>

            <span id="checkout-subtotal">₹0</span>

        </div>

        <div class="summary-item">

            <span>Delivery</span>

            <span id="checkout-delivery">₹30</span>

        </div>

        <div class="summary-item">

            <span>GST (5%)</span>

            <span id="checkout-tax">₹0</span>

        </div>

        <hr>

        <div class="summary-item total-price">

            <strong>Total</strong>

            <strong id="checkout-total">₹0</strong>

        </div>

        <button
            id="place-order-btn"
            class="btn btn-success btn-lg w-100 mt-4">

            <i class="bi bi-bag-check-fill"></i>

            Place Order

        </button>

    </div>

</div>

<script src="assets/js/checkout.js"></script>
<script src="assets/js/theme.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
